<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Менеджер Дедлайнів</title>
    <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline' https://*.posthog.com;
    connect-src 'self' https://*.posthog.com;
    img-src 'self' data: https://*.posthog.com;
    style-src 'self' 'unsafe-inline';
">
    <style>
        .urgent {
            color: red;
            font-weight: bold;
        }

        .on-time {
            color: green;
        }

        .task-item {
            margin-bottom: 10px;
            border-bottom: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <h1>Мій Менеджер Дедлайнів</h1>
    <p>Статус:<span id="app-status">Завантаження...</span></p>
    <form id="deadline-form">
        <input type="text" id="task-name" placeholder="Назва завдання" required>
        <input type="date" id="deadline-date" required>
        <button type="submit" id="add-task-btn">Додати завдання</button>
    </form>

    <div id="task-list">
    </div>

    <script type="module" src="main.js"></script>
    <script type="module">
        const status = import.meta.env.VITE_APP_STATUS;
        document.getElementById('app-status').innerText = status;
    </script>
</body>
</html>
